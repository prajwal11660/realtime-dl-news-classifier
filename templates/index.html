<!DOCTYPE html>
<html lang="en">
<head>
    <title>Agentic Intelligence | Research Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .aura-bg { background: radial-gradient(circle at 0% 0%, rgba(16, 185, 129, 0.05) 0%, transparent 25%), 
                           radial-gradient(circle at 100% 100%, rgba(245, 158, 11, 0.05) 0%, transparent 25%),
                           #020617; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
        .glow-emerald { text-shadow: 0 0 20px rgba(16, 185, 129, 0.4); }
    </style>
</head>
<body class="aura-bg text-slate-200 min-h-screen selection:bg-emerald-500/30 overflow-x-hidden">
    
    <div class="container mx-auto p-6 lg:p-12">
        <!-- Header -->
        <header class="flex justify-between items-end mb-16">
            <div>
                <h1 class="text-4xl font-extrabold text-white tracking-tighter mb-2">
                    Agentic<span class="text-emerald-400">.</span>
                </h1>
                <p class="text-slate-500 text-xs uppercase tracking-[0.3em] font-semibold">Real-Time Research Node</p>
            </div>
            <div id="status" class="px-5 py-2 glass rounded-full text-[10px] font-bold uppercase tracking-widest transition-all duration-500 border border-white/5">
                Connecting...
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-12">
            <!-- Left Column: Feed -->
            <div class="lg:col-span-8 space-y-8">
                <div class="flex items-center justify-between">
                    <h2 class="text-sm font-bold text-slate-400 uppercase tracking-widest">Live Stream</h2>
                    <div class="h-px flex-grow mx-6 bg-gradient-to-r from-white/10 to-transparent"></div>
                </div>
                
                <div id="insight-feed" class="space-y-6 h-[700px] overflow-y-auto pr-6 custom-scrollbar">
                    <!-- Cards injected here -->
                </div>
            </div>

            <!-- Right Column: Sidebar -->
            <div class="lg:col-span-4 space-y-10">
                <div class="glass p-10 rounded-[2.5rem] shadow-2xl relative overflow-hidden group">
                    <div class="absolute top-0 right-0 -mr-10 -mt-10 w-40 h-40 bg-emerald-500/5 blur-[80px] rounded-full"></div>
                    
                    <h2 class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-10 text-center">Market Mood</h2>
                    
                    <div class="text-center mb-10">
                        <span id="avg-score" class="text-8xl font-extrabold text-white glow-emerald tracking-tighter">0.0</span>
                        <p class="text-emerald-500/60 text-[10px] font-bold uppercase tracking-widest mt-4">Composite Score</p>
                    </div>

                    <!-- GPU Agent -->
                    <div class="mt-12 pt-10 border-t border-white/5">
                        <div class="flex items-center gap-3 mb-6">
                            <div class="w-1.5 h-1.5 bg-amber-400 rounded-full animate-ping"></div>
                            <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">Analyst Terminal</h3>
                        </div>
                        
                        <div id="agent-response" class="bg-black/40 p-6 rounded-2xl text-xs text-amber-200/70 italic mb-6 border border-amber-500/5 leading-relaxed min-h-[100px] flex items-center justify-center text-center">
                            Awaiting transmission...
                        </div>

                        <div class="relative">
                            <input type="text" id="user-query" 
                                   class="w-full bg-white/5 border border-white/5 rounded-2xl p-5 text-xs text-white focus:outline-none focus:border-emerald-500/30 transition-all placeholder:text-slate-600 shadow-inner"
                                   placeholder="Ask the node anything...">
                            <button onclick="askAgent()" 
                                    class="absolute right-2 top-2 bg-white text-black font-bold px-5 py-3 rounded-xl text-[10px] uppercase tracking-widest hover:bg-emerald-400 transition-all active:scale-95">
                                Send
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        const feed = document.getElementById('insight-feed');
        const statusBadge = document.getElementById('status');

        socket.on('connect', () => {
            statusBadge.innerText = "Node Online";
            statusBadge.classList.add('text-emerald-400', 'bg-emerald-500/5', 'border-emerald-500/20');
        });

        socket.on('new_insight', (data) => {
            const card = document.createElement('div');
            const accentColor = data.priority ? "border-amber-500/40" : "border-white/5";
            
            card.className = `glass p-8 rounded-[2rem] border-l-2 ${accentColor} animate__animated animate__fadeInUp group transition-all hover:bg-white/[0.03]`;
            card.innerHTML = `
                <div class="flex justify-between items-start mb-4">
                    <h4 class="font-bold text-lg leading-tight ${data.priority ? 'text-amber-200' : 'text-white'}">${data.title}</h4>
                    <span class="text-[10px] font-black bg-white/5 px-3 py-1 rounded-full text-emerald-400 border border-white/5">${data.score}</span>
                </div>
                <p class="text-slate-400 text-xs leading-relaxed mb-6 font-light">${data.summary}</p>
                <div class="flex items-center gap-4 text-[9px] uppercase tracking-widest font-bold text-slate-500">
                    <span class="flex items-center gap-2">
                        <div class="w-1 h-1 rounded-full bg-emerald-500"></div>
                        ${data.sentiment}
                    </span>
                    <span class="opacity-20">|</span>
                    <span>TechCrunch Node</span>
                </div>
            `;
            feed.prepend(card);
            document.getElementById('avg-score').innerText = data.score;
        });

        function askAgent() {
            const input = document.getElementById('user-query');
            const responseBox = document.getElementById('agent-response');
            if(!input.value) return;

            responseBox.innerHTML = '<span class="text-emerald-400 animate-pulse tracking-widest text-[10px] uppercase font-black">Synthesizing...</span>';
            socket.emit('ask_agent', { question: input.value });
            input.value = ""; 
        }

        socket.on('agent_answer', (data) => {
            document.getElementById('agent-response').innerText = data.answer;
        });

        socket.on('connect_error', () => {
            statusBadge.innerText = "Offline";
            statusBadge.className = "px-5 py-2 glass rounded-full text-[10px] font-bold uppercase tracking-widest text-red-400 border-red-500/20";
        });
    </script>
</body>
</html>
